<body>
    <!-- Cabecera -->
    <header>
            <div class="logo">
                <h1>
                    <img src="../../contenido/imagenes/logo/logojoystick.png" alt="Logo de PlaySent">
                    <a href="../../index.html">PlaySent</a>
                </h1>
            </div>
    <!-- Menu de navegación -->
    <div class="container">
        <nav>
            <ul id="nav-list">
                <li><a href="/categorias/accion.html"><ion-icon name="flash-outline"></ion-icon>Acción</a></li>
                <li><a href="/categorias/aventura.html"><ion-icon name="compass-outline"></ion-icon>Aventura</a></li>
                <li><a href="/categorias/simulacion.html"><ion-icon name="hardware-chip-outline"></ion-icon>Simulación</a></li>
                <li><a href="/categorias/estrategia.html"><ion-icon name="analytics-outline"></ion-icon>Estrategia</a></li>

        </nav>
        <!-- Menú hamburguesa -->
        <div id="menu-toggle" class="menu-hamburguesa">
        <ion-icon name="menu-outline"></ion-icon>
        </div>
    </div>
    <!-- Contenedor de acciones -->
    <div class="actions">

        <!-- Botón Audio -->
        <button id="audio-toggle" class="btn-audio">
            <ion-icon id="audio-icon" name="volume-mute-outline"></ion-icon>
        </button>
        <audio id="audio-player" src="../../../contenido/audio/audio-principal/principal.mp3"></audio>

        <!-- Botón Modo Oscuro -->
        <button id="theme-toggle" class="btn-theme">
            <ion-icon id="theme-icon" name="moon-outline"></ion-icon>
        </button>

        <!-- Botón Iniciar Sesión -->
        <a href="javascript:redirectToLogin()" id="login-icon">
            <ion-icon name="person-circle-outline"></ion-icon>
        </a>        
    </div>

    <div class="user-menu" id="userMenu" style="display: none;">
        <button id="userButton">
            <ion-icon name="person-circle-outline"></ion-icon>
        </button>
        <div class="submenu">
            <p id="usernameDisplay"></p>
            <button id="logoutButton">Cerrar sesión</button>
        </div>
    </div>
    </header>
    
<!-- Cuerpo -->
    <main class ="mostrador">
        <section id="VideojuegosCategoriaAventura">
            <h2>Los mejores juegos de Aventura</h2>
            <div class="carrusel-wrapper">
                <button class="btn-izq">&#10094;</button>
                <div class="carrusel-track" id="carrusel-aventura">

                </div>
                <button class="btn-der">&#10095;</button>
            </div>
        </section>
    </main>

    <!-- Footer -->

        <nav>
            <a href="https://www.facebook.com/"><ion-icon name="logo-facebook"></ion-icon> Facebook</a>

        <nav>
            <a href="#">Política de Privacidad</a> |
            <a href="#">Términos y Condiciones</a>

            <h3 id="modal-title"></h3>
            <div class="modal-body">
                <img src="" alt="Imagen Modal" id="modal-image">
                <div class="info-container"> 
                    <div class="description">
                        <p id="modal-description"></p>
                    </div>
                    <a href="#" class="btn-details" id="modal-button">Más detalles</a>
